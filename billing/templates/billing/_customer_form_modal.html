<form id="ajaxCustomerForm">
  {% csrf_token %}
  {% for field in form %}
  <div class="mb-2">
    {% if field.field.widget.input_type == 'checkbox' %}
    <div class="form-check">
      <input type="checkbox" class="form-check-input" name="{{ field.html_name }}" id="{{ field.id_for_label }}" {% if field.value %}checked{% endif %}>
      <label class="form-check-label small" for="{{ field.id_for_label }}">{{ field.label }}</label>
    </div>
    {% else %}
    <label class="form-label small fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}"
           class="form-control form-control-sm" value="{{ field.value|default_if_none:'' }}">
    {% endif %}
  </div>
  {% endfor %}
</form>

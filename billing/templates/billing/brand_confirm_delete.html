{% extends 'billing/base.html' %}
{% block title %}Eliminar marca{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card danger-card">
      <div class="danger-card-header">
        <span class="danger-icon"><i class="bi bi-exclamation-triangle"></i></span>
        <div>
          <h4 class="mb-0">Confirmar eliminación</h4>
          <p class="text-muted mb-0 small">Esta acción no se puede deshacer</p>
        </div>
      </div>
      <div class="card-body p-4">
        <p class="mb-4">¿Estás seguro de eliminar la marca <strong>{{ object }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          {% if request.GET.page %}<input type="hidden" name="page" value="{{ request.GET.page }}">{% endif %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
            <a href="{% url 'billing:brand_list' %}{% if request.GET.page %}?page={{ request.GET.page }}{% endif %}" class="btn btn-outline-secondary px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

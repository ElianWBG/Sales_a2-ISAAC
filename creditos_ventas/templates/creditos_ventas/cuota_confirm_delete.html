{% extends 'billing/base.html' %}
{% block title %}Eliminar cuota{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card danger-card">
      <div class="danger-card-header">
        <span class="danger-icon"><i class="bi bi-exclamation-triangle"></i></span>
        <div>
          <h4 class="mb-0">Confirmar eliminación</h4>
          <p class="text-muted mb-0 small">Esta acción no se puede deshacer</p>
        </div>
      </div>
      <div class="card-body p-4">
        <p class="mb-4">
          ¿Estás seguro de eliminar la <strong>cuota {{ object.numero }}</strong> de la
          factura <strong>#{{ object.factura_id }}</strong>?
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
            <a href="{% url 'creditos_ventas:cuotas_factura' object.factura_id %}" class="btn btn-outline-secondary px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'billing/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card auth-card shadow-lg border-0">
  <div class="card-body p-4 p-md-5">
    <div class="text-center mb-4">
      <span class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
            style="width:56px;height:56px;background:rgba(var(--primary-rgb),.1);color:var(--primary);font-size:1.5rem;">
        <i class="bi bi-graph-up-arrow"></i>
      </span>
      <h4 class="mb-1 fw-bold">Sistema de Ventas</h4>
      <p class="text-muted mb-0">Inicia sesión para continuar</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        <input type="{{ field.field.widget.input_type }}"
               name="{{ field.html_name }}"
               class="form-control {% if field.errors %}is-invalid{% endif %}"
               value="{{ field.value|default_if_none:'' }}">
        {% for error in field.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
        <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
      </button>
    </form>
  </div>
</div>
{% endblock %}
